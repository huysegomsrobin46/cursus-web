tips_en_tricks:
  - "Tab-completion in de terminal spaart enorm veel tikwerk. Typ de eerste letters van een commando of pad en druk op Tab — de shell vult aan."
  - "Ctrl+C stopt een lopend commando. Ctrl+D sluit een terminal-sessie (equivalent van 'exit')."
  - "Bij twijfel: man <commando> of <commando> --help geeft uitleg rechtstreeks in de terminal, zonder Google."
  - "docker compose down verwijdert de containers maar bewaart volumes. Voeg -v toe om ook volumes te wissen en met een propere lei te beginnen."

en_nu:
  tekst: "De hands-on opdracht staat klaar op GitHub. Volg de stappen in opdracht.md en gebruik check.sh om je eigen werk te verifiëren."
  link: "https://github.com/SASM-Foundations/labo-week-01"

test_jezelf:
  - "Wat is het verschil tussen /etc en /var? Waarom staan configuratiebestanden in /etc en logs in /var/log?"
  - "Leg in eigen woorden uit wat systemd doet. Wat is een 'service' in die context, en hoe controleer je de status ervan?"
  - "Je hebt zojuist een Docker-container gestart en bestanden aangemaakt. Wat gebeurt er met die bestanden als je docker compose down -v uitvoert? Hoe zou je ze bewaren?"
