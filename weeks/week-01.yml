week: 1
titel: "Server Fundamenten & Docker"
fase: A
leerdoelen: [LD1, LD5, LD8]

wist_je_dat:
  tekst: >
    De eerste webserver ter wereld draaide op een NeXT-computer op het bureau van Tim Berners-Lee bij CERN.
    Er hing een handgeschreven briefje op: "This machine is a server. DO NOT POWER IT DOWN!" —
    en zo begon het internet zoals wij het kennen.
  link: "https://home.cern/science/computing/birth-web"
  bron: "CERN — The birth of the web"

doelstellingen:
  - "Je verklaart het verschil tussen een server en een gewone computer, en waarom de afwezigheid van een GUI in een serveromgeving een voordeel is."
  - "Je navigeert zelfstandig door de Linux-bestandssysteemlayout (FHS) en weet wat er in /etc, /var, /home en /proc staat."
  - "Je verklaart het verschil tussen een virtuele machine en een container, en legt uit waarom Docker dit semester ons werkplatform is."
  - "Je start een Debian-container op via docker compose up en voert basiscommando's uit vanuit docker exec."

wat_weet_je_al:
  - "Heb je ooit een Linux-commando gebruikt? Welk commando gebruik je het vaakst?"
  - "Wat denk jij dat het verschil is tussen een virtuele machine en een container?"
  - "Stel je voor dat je een eigen website wil hosten. Welke stukken software heb je daarvoor nodig?"

leerinhoud:
  beschrijving: "Slides en opname worden hier toegevoegd na de contactles van week 1."
  items: []
